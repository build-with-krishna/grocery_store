{% extends 'base.html' %}

{% block content %}

<h3>Redirecting To Razorpay...</h3>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<form
name="razorpay-form"
action="/payments/verify/"
method="POST">

{% csrf_token %}

<input
type="hidden"
name="razorpay_order_id"
value="{{ razorpay_order_id }}">

<input
type="hidden"
name="razorpay_payment_id"
id="razorpay_payment_id">

<input
type="hidden"
name="razorpay_signature"
id="razorpay_signature">

</form>

<script>

var options = {

"key": "{{ razorpay_key }}",

"amount": "{{ amount }}",

"currency": "INR",

"name": "Flipkart Clone",

"description": "Order Payment",

"order_id": "{{ razorpay_order_id }}",

"handler": function (response){

document.getElementById(
'razorpay_payment_id'
).value = response.razorpay_payment_id;

document.getElementById(
'razorpay_signature'
).value = response.razorpay_signature;

document.forms['razorpay-form'].submit();

}

};

var rzp = new Razorpay(options);

rzp.open();

</script>

{% endblock %}
